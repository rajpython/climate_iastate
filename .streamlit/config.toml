[server]
headless            = true
port                = 8501
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 10

[browser]
gatherUsageStats = false

[theme]
base              = "dark"
primaryColor      = "#1f77b4"
backgroundColor   = "#0e1117"
secondaryBackgroundColor = "#1e2130"
textColor         = "#fafafa"
font              = "sans serif"

[logger]
level = "warning"
